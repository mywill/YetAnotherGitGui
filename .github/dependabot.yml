version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Keep all @tauri-apps/* packages in one PR so JS bumps land
      # together and stay aligned with the cargo-side tauri group.
      tauri:
        patterns:
          - "@tauri-apps/*"
      development:
        dependency-type: "development"
        patterns:
          - "*"
      production:
        dependency-type: "production"
        patterns:
          - "*"

  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Tauri crate + plugins must move together with @tauri-apps/* on
      # the npm side. Dependabot can't span ecosystems in a single PR,
      # but matching groups land in lockstep on the same schedule.
      tauri:
        patterns:
          - "tauri"
          - "tauri-build"
          - "tauri-plugin-*"
      rust-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
